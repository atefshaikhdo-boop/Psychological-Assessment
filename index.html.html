<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Personality Assessment | Atef Shaikh, DO</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ef;
  --ink:#1e1a18;
  --muted:#6b6560;
  --card:#ffffff;
  --line:#e8e2da;
  --brand:#3d6b5e;
  --brand-light:#edf4f2;
  --brand-mid:#c3ddd8;
  --accent:#c2714f;
  --good:#3d6b5e;
  --warn:#9a6238;
  --shadow:0 2px 24px rgba(30,26,24,.07),0 1px 4px rgba(30,26,24,.05);
  --shadow-lg:0 8px 48px rgba(30,26,24,.11),0 2px 8px rgba(30,26,24,.06);
  --radius:20px;
  --radius-sm:12px;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'DM Sans',system-ui,-apple-system,sans-serif;
  color:var(--ink);
  background:var(--bg);
  min-height:100vh;
  line-height:1.6;
  font-size:16px;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:760px;margin:0 auto;padding:32px 20px 100px}

/* Hero */
.hero{
  border-radius:var(--radius);
  padding:52px 48px;
  background:#1e3a34;
  color:#f0f7f5;
  margin-bottom:4px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:"";
  position:absolute;
  top:-60px;right:-80px;
  width:320px;height:320px;
  border-radius:50%;
  background:rgba(195,221,216,.1);
  pointer-events:none;
}
.hero::after{
  content:"";
  position:absolute;
  bottom:-100px;left:-40px;
  width:260px;height:260px;
  border-radius:50%;
  background:rgba(195,221,216,.07);
  pointer-events:none;
}
.eyebrow{
  font-family:'DM Sans',sans-serif;
  letter-spacing:.1em;
  text-transform:uppercase;
  font-size:.72rem;
  font-weight:600;
  color:#a8c8c2;
  margin-bottom:14px;
}
h1{
  font-family:'Lora',Georgia,serif;
  font-size:clamp(2rem,4.5vw,3.2rem);
  line-height:1.15;
  font-weight:500;
  letter-spacing:-.02em;
  margin:0 0 18px;
  color:#f0f7f5;
}
h2{
  font-family:'Lora',Georgia,serif;
  font-size:clamp(1.3rem,2.5vw,1.75rem);
  font-weight:500;
  letter-spacing:-.02em;
  margin:0 0 12px;
  color:var(--ink);
  line-height:1.3;
}
h3{
  font-family:'DM Sans',sans-serif;
  font-size:1rem;
  font-weight:500;
  margin:0 0 10px;
  line-height:1.5;
  color:var(--ink);
}
p{margin:0 0 14px}
.hero p{font-size:1.05rem;color:#c3ddd8;max-width:620px;line-height:1.7;font-weight:300}

/* Pills */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:22px}
.pill{
  padding:7px 14px;
  border:1px solid rgba(195,221,216,.3);
  border-radius:999px;
  background:rgba(195,221,216,.12);
  font-size:.8rem;
  font-weight:500;
  color:#a8c8c2;
  letter-spacing:.01em;
}

/* Cards */
.card{
  background:var(--card);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  border-radius:var(--radius);
  padding:36px;
  margin-top:16px;
}

/* Typography helpers */
.soft{color:var(--muted)}
.small{font-size:.875rem}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}

/* Form labels & inputs */
label{
  display:block;
  font-weight:500;
  font-size:.82rem;
  letter-spacing:.03em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
}
input,textarea{
  width:100%;
  border:1.5px solid var(--line);
  border-radius:var(--radius-sm);
  padding:13px 15px;
  background:#fdfcfb;
  color:var(--ink);
  font:inherit;
  font-size:.95rem;
  outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,textarea:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 4px rgba(61,107,94,.12);
  background:#fff;
}
input:disabled{background:#f4f2ef;color:var(--muted)}

/* Buttons */
.btn{
  appearance:none;
  border:none;
  border-radius:999px;
  padding:13px 24px;
  font-family:'DM Sans',sans-serif;
  font-weight:600;
  font-size:.92rem;
  cursor:pointer;
  background:var(--brand);
  color:#fff;
  box-shadow:0 4px 16px rgba(61,107,94,.25);
  transition:all .15s ease;
  margin:4px 6px 4px 0;
  letter-spacing:.01em;
}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(61,107,94,.3)}
.btn:active{transform:translateY(0)}
.btn.secondary{
  background:#f0f7f5;
  color:var(--brand);
  border:1.5px solid var(--brand-mid);
  box-shadow:none;
}
.btn.secondary:hover{background:var(--brand-light);box-shadow:none}
.btn.ghost{
  background:transparent;
  color:var(--muted);
  border:1.5px solid var(--line);
  box-shadow:none;
}
.btn.ghost:hover{background:#f4f2ef;color:var(--ink);box-shadow:none}

/* Top progress bar */
.topbar{
  position:sticky;
  top:0;
  z-index:5;
  margin:0 -20px 20px;
  padding:14px 20px;
  background:rgba(247,244,239,.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);
}
.barrow{
  max-width:760px;
  margin:0 auto;
  display:flex;
  gap:14px;
  align-items:center;
  justify-content:space-between;
}
.progress{
  height:8px;
  background:rgba(61,107,94,.12);
  border-radius:999px;
  overflow:hidden;
  flex:1;
}
.fill{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--brand),#5e9e8e);
  border-radius:999px;
  transition:width .3s ease;
}

/* Question cards */
.qcard{
  padding:24px;
  border:1.5px solid var(--line);
  background:#fdfcfb;
  border-radius:var(--radius);
  margin:12px 0;
  transition:border-color .15s;
}
.qcard:focus-within{border-color:var(--brand-mid)}
.qnum{
  font-size:.72rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:#aaa49e;
  font-weight:600;
  margin-bottom:10px;
}

/* Answer choices */
.scale{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}
.scale.pbq{grid-template-columns:repeat(5,1fr)}
.choice{
  display:flex;
  flex-direction:column;
  gap:6px;
  align-items:center;
  text-align:center;
  min-height:70px;
  border:1.5px solid var(--line);
  background:#fff;
  border-radius:var(--radius-sm);
  padding:12px 8px;
  font-size:.78rem;
  font-weight:500;
  line-height:1.35;
  cursor:pointer;
  transition:all .13s ease;
  color:var(--muted);
}
.choice:hover{
  border-color:var(--brand-mid);
  background:var(--brand-light);
  color:var(--brand);
}
.choice input{
  width:18px;
  height:18px;
  accent-color:var(--brand);
  margin:0;
  flex-shrink:0;
  padding:0;
}
.choice:has(input:checked){
  background:var(--brand-light);
  border-color:var(--brand);
  color:var(--brand);
  box-shadow:0 0 0 3px rgba(61,107,94,.1);
}

/* Notice / info box */
.notice{
  border-left:3px solid var(--brand);
  padding:14px 18px;
  background:var(--brand-light);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  color:#2a5048;
  line-height:1.6;
}
.notice b{color:#1e3a34}

/* Utilities */
.hide{display:none!important}
.resume{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  background:#fffbf5;
  border:1.5px solid #f0dfc8;
}
.nav{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-top:24px;
  flex-wrap:wrap;
}
.status{
  white-space:pre-wrap;
  font-size:.9rem;
  margin-top:14px;
  padding:14px 16px;
  border-radius:var(--radius-sm);
  background:#f8f6f3;
  border:1.5px solid var(--line);
  line-height:1.6;
}
.status.ok{border-color:#b3d5c8;background:#edf7f2;color:#1e5040}
.status.err{border-color:#f0c8b5;background:#fdf3ee;color:#7a3a22}
.sectionTitle{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
  margin-bottom:18px;
}
.pill[style]{font-family:'DM Sans',sans-serif}

@media(max-width:640px){
  .hero{padding:32px 24px;border-radius:16px}
  .card{padding:22px 18px}
  .grid,.scale,.scale.pbq{grid-template-columns:1fr}
  .barrow{flex-direction:column;align-items:stretch;gap:8px}
  h1{font-size:1.9rem}
  .choice{flex-direction:row;text-align:left;align-items:flex-start;min-height:auto;padding:12px}
}
</style></head><body><div id="app"></div>

ers."}, {"n": 44, "text": "I have to depend on myself to see that things get done."}, {"n": 45, "text": "Others tend to be too casual, often irresponsible, self-indulgent, or incompetent."}, {"n": 46, "text": "It is important to do a perfect job on everything."}, {"n": 47, "text": "I need order, systems, and rules in order to get the job done properly."}, {"n": 48, "text": "If I don’t have systems, everything will fall apart."}, {"n": 49, "text": "Any flaw or defect of performance may lead to a catastrophe."}, {"n": 50, "text": "It is necessary to stick to the highest standards at all times, or things will fall apart."}, {"n": 51, "text": "I need to be in complete control of my emotions."}, {"n": 52, "text": "People should do things my way."}, {"n": 53, "text": "If I don’t perform at the highest level, I will fail."}, {"n": 54, "text": "Flaws, defects, or mistakes are intolerable."}, {"n": 55, "text": "Details are extremely important."}, {"n": 56, "text": "My way of doing things is generally the best way."}, {"n": 57, "text": "I have to look out for myself."}, {"n": 58, "text": "Force or cunning is the best way to get things done."}, {"n": 59, "text": "We live in a jungle and the strong person is the one who survives."}, {"n": 60, "text": "People will get at me if I don’t get them first."}, {"n": 61, "text": "It is not important to keep promises or honor debts."}, {"n": 62, "text": "Lying and cheating are OK as long as you don’t get caught."}, {"n": 63, "text": "I have been unfairly treated and am entitled to get my fair share by whatever means I can."}, {"n": 64, "text": "Other people are weak and deserve to be taken."}, {"n": 65, "text": "If I don’t push other people, I will get pushed around."}, {"n": 66, "text": "I should do whatever I can get away with."}, {"n": 67, "text": "What others think of me doesn’t really matter."}, {"n": 68, "text": "If I want something, I should do whatever is necessary to get it."}, {"n": 69, "text": "I can get away with things so I ssment on a private personal device. Do not use a shared, public, or work computer. Progress is saved only for this browser session and is cleared automatically when you close the tab.</div><div class="grid" style="margin-top:18px"><div><label>Full name</label><input id="name" value="${esc(state.meta.name)}" autocomplete="name"></div><div><label>Date of birth</label><input id="dob" type="date" value="${esc(state.meta.dob)}"></div><div><label>Email address <span class="soft">optional</span></label><input id="email" type="email" value="${esc(state.meta.email)}" autocomplete="email"></div><div><label>Clinician</label><input value="${esc(D.clinician)}" disabled></div></div><p class="soft small" style="margin-top:14px">Results are transmitted directly and confidentially to Dr. Shaikh to supplement your clinical interview. This assessment is one source of information among many and does not generate a diagnosis independently.</p><button class="btn" id="begin" type="button">Begin assessment</button></div></div>`;

$('#clear')?.addEventListener('click',()=>{if(confirm('This will erase all your saved answers and start from the beginning. Are you sure?')){sessionStorage.removeItem(STORE);state=defaultState();render();}});
}
function renderQuestions(kind, items, labels){const answers=kind==='pid'?state.pidAnswers:state.pbqAnswers; const cls=kind==='pbq'?'scale pbq':'scale'; return items.map((it,idx)=>`<div class="qcard" id="q_${kind}_${it.n}"><div class="qnum">Question ${idx+1} of ${items.length}</div><h3>${esc(it.text)}</h3><div class="${cls}">${labels.map(l=>`<label class="choice"><input type="radio" name="${kind}_${it.n}" value="${l.v}" ${answers[it.n]==l.v?'checked':''}><span>${esc(l.t)}</span></label>`).join('')}</div></div>`).join('');}
const pidLabels=[{v:0,t:'Very false or often false'},{v:1,t:'Sometimes or somewhat false'},{v:2,t:'Sometimes or somewhat true'},{v:3,t:'Very true or often true'}];
const pbqLabels=[{v:0,t:'Do not believe it at all'},{v:1,t:'Believe it slightly'},{v:2,t:'Believe it moderately'},{v:3,t:'Believe it very much'},{v:4,t:'Believe it totally'}];
function pidPage(){ $('#app').innerHTML=`${topbar('Section 1 of 2 — Personality Inventory')}<div class="wrap"><div class="card"><div class="sectionTitle"><div><h2>Personality Inventory for DSM-5 (PID-5)</h2><p class="soft">This standardized instrument assesses personality traits across five clinically validated domains. For each statement, select the response that most accurately reflects how you typically think, feel, or behave — not how you feel today specifically, but in general.</p></div><span id="countBadge" class="pill" style="color:#2a5048;background:#edf4f2;border-color:#c3ddd8">${answeredCount('pid')} / ${pidTotal()} completed</span></div><div id="pidQs">${renderQuestions('pid',D.pidItems,pidLabels)}</div><div class="nav"><button class="btn secondary" id="saveExit">Save progress</button><div><button class="btn ghost" id="backIntro">Back</button><button class="btn" id="finishPID">Continue to section 2</button></div></div></div></div>`; bindQuestionRadios('pid'); $('#saveExit').onclick=()=>{save();alert('Your progress has been saved. You may close this page and resume from this device at any time.');}; $('#backIntro').onclick=()=>setPage('intro'); $('#finishPID').onclick=()=>{let missing=D.pidItems.find(it=>state.pidAnswers[it.n]===undefined); if(missing){alert('All items must be completed before proceeding. The first unanswered item has been highlighted.'); document.getElementById('q_pid_'+missing.n).scrollIntoView({behavior:'smooth',block:'center'}); return;} selectPBQModules(); setPage('bridge');};}
function bridge(){ $('#app').innerHTML=`${topbar('Section 2 of 2 — Belief Inventory')}<div class="wrap"><div class="card"><h2>Section 1 complete — one section remaining</h2><p>Thank you for completing the Personality Inventory. The second section is the <strong>Personality Belief Questionnaire (PBQ)</strong>, a standardized measure of core cognitive schemas and belief patterns associated with different personality presentations.</p><div class="notice"><b>About the follow-up items:</b> The specific subscales you will complete have been selected algorithmically based on your PID-5 response pattern. This adaptive process ensures the assessment targets the most clinically relevant domains for your profile. Results are interpreted exclusively by Dr. Shaikh in the context of your full clinical picture.</div><p class="soft small" style="margin-top:12px">${pbqTotal()} items selected for your profile</p><button class="btn" id="startFollow">Begin section 2</button><button class="btn secondary" id="editMain">Back to section 1</button></div></div>`; $('#startFollow').onclick=()=>setPage('pbq'); $('#editMain').onclick=()=>setPage('pid');}
function pbqPage(){const nums=pbqNeededItems(); const items=nums.map(n=>D.pbqItems.find(x=>x.n===n)).filter(Boolean); $('#app').innerHTML=`${topbar('Section 2 of 2 — Personality Belief Questionnaire')}<div class="wrap"><div class="card"><div class="sectionTitle"><div><h2>Personality Belief Questionnaire (PBQ)</h2><p class="soft">For each statement, indicate how strongly you hold this belief on a typical day. Rate your genuine level of agreement — not what you think you should believe, but what actually reflects your experience.</p></div><span id="countBadge" class="pill" style="color:#2a5048;background:#edf4f2;border-color:#c3ddd8">${answeredCount('pbq')} / ${items.length} completed</span></div><div id="pbqQs">${renderQuestions('pbq',items,pbqLabels)}</div><div class="nav"><button class="btn secondary" id="saveExit">Save progress</button><div><button class="btn ghost" id="backBridge">Back</button><button class="btn" id="finishPBQ">Review &amp; submit</button></div></div></div></div>`; bindQuestionRadios('pbq'); $('#saveExit').onclick=()=>{save();alert('Your progress has been saved. You may close this page and resume from this device at any time.');}; $('#backBridge').onclick=()=>setPage('bridge'); $('#finishPBQ').onclick=()=>{let missing=items.find(it=>state.pbqAnswers[it.n]===undefined); if(missing){alert('All items must be completed before proceeding. The first unanswered item has been highlighted.'); document.getElementById('q_pbq_'+missing.n).scrollIntoView({behavior:'smooth',block:'center'}); return;} setPage('review');};}
function review(){ $('#app').innerHTML=`${topbar('Review &amp; submit')}<div class="wrap"><div class="card"><h2>Assessment complete</h2><p><b>Both sections of the assessment have been completed.</b> Your responses are ready to be transmitted to Dr. Shaikh for clinical review and formulation.</p><p class="soft">Scores, profiles, and clinical interpretations are not displayed here. All results will be reviewed by Dr. Shaikh alongside your clinical interview — this assessment provides structured supplementary data, not a standalone conclusion.</p><div><label>Additional clinical context for Dr. Shaikh <span class="soft">(optional)</span></label><textarea id="comments" rows="5" placeholder="You may use this field to provide any additional context relevant to today's assessment — for example, significant recent stressors, health changes, or anything you feel may have influenced your responses.">${esc(state.comments)}</textarea></div><p class="soft small" style="margin-top:10px">Responses are transmitted securely and confidentially to Dr. Shaikh. No report is sent to the patient.</p><button class="btn secondary" id="editFollow">Back to section 2</button><button class="btn ghost" id="testEmail">Send test email only</button><button class="btn" id="send">Submit assessment</button><div id="status" class="status hide"></div></div></div>`; $('#comments').oninput=e=>{state.comments=e.target.value;save();}; $('#editFollow').onclick=()=>setPage('pbq'); $('#testEmail').onclick=sendTestEmail; $('#send').onclick=sendReport;}
function done(){ $('#app').innerHTML=`<div class="wrap"><section class="hero"><div class="eyebrow">Assessment submitted</div><h1>Thank you for completing the assessment</h1><p>Your responses have been transmitted securely to Dr. Shaikh. They will be reviewed as part of your clinical formulation prior to or during your next appointment. No further action is required on your part.</p></section><div class="card"><p class="notice"><b>Submission confirmed.</b> This page may now be closed. If you have any questions about the assessment process, please contact Dr. Shaikh's office directly.</p><button class="btn ghost" id="clearDone">Clear my responses from this device</button></div></div>`; $('#clearDone').onclick=()=>{sessionStorage.removeItem(STORE);state=defaultState();render();};}
function bindQuestionRadios(kind){$$(kind==='pid'?'input[name^="pid_"]':'input[name^="pbq_"]').forEach(inp=>inp.addEventListener('change',e=>{const n=e.target.name.split('_')[1]; if(kind==='pid') state.pidAnswers[n]=Number(e.target.value); else state.pbqAnswers[n]=Number(e.target.value); save(); const badge=$('#countBadge'); if(badge) badge.textContent=kind==='pid'?`${answeredCount('pid')} / ${pidTotal()}`:`${answeredCount('pbq')} / ${pbqTotal()}`; const fill=$('.fill'); if(fill) fill.style.width=overallProgress()+'%'; const pct=$('.barrow .small'); if(pct) pct.textContent=overallProgress()+'%';}));}
function scorePidValue(item){let raw=state.pidAnswers[String(item)] ?? state.pidAnswers[item]; if(raw===undefined) return null; return D.pidReverse.includes(Number(item)) ? 3-Number(raw) : Number(raw);}
function average(vals){vals=vals.filter(v=>v!==null&&v!==undefined&&!Number.isNaN(v)); return vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : null;}
function computePID(){const facets={}; for(const [name,arr] of Object.entries(D.pidFacets)){facets[name]=average(arr.map(x=>{const s=String(x); return s.endsWith('R') ? (state.pidAnswers[s.slice(0,-1)]===undefined?null:3-Number(state.pidAnswers[s.slice(0,-1)])) : scorePidValue(s);}));} const domains={}; for(const [name,fac] of Object.entries(D.pidDomains)) domains[name]=average(fac.map(f=>facets[f])); return {facets,domains};}
function selectPBQModules(){const pid=computePID(); let chosen=new Set(); const add=a=>a.forEach(x=>chosen.add(x)); const dom=pid.domains, fac=pid.facets; if((dom['Negative Affect']||0)>=1.35) add(['Avoidant','Dependent','Borderline belief index']); if((dom['Detachment']||0)>=1.25) add(['Avoidant','Schizoid']); if((dom['Antagonism']||0)>=1.15) add(['Narcissistic','Antisocial','Paranoid']); if((dom['Disinhibition']||0)>=1.35) add(['Antisocial','Histrionic','Passive-Aggressive']); if((dom['Psychoticism']||0)>=1.15) add(['Paranoid','Schizoid']); if((fac['Rigid Perfectionism']||0)>=1.15 || (fac['Perseveration']||0)>=1.35) add(['Obsessive-Compulsive']); if((fac['Separation Insecurity']||0)>=1.25) add(['Dependent','Borderline belief index']); if((fac['Suspiciousness']||0)>=1.1) add(['Paranoid']); if((fac['Grandiosity']||0)>=1.0 || (fac['Attention Seeking']||0)>=1.3) add(['Narcissistic','Histrionic']); if(chosen.size<3) add(['Avoidant','Obsessive-Compulsive','Paranoid']); state.selectedScales=Array.from(chosen); const needed=new Set(pbqNeededItems().map(String)); Object.keys(state.pbqAnswers).forEach(k=>{if(!needed.has(k)) delete state.pbqAnswers[k];}); save();}
function computePBQ(){const out={}; for(const [name,sc] of Object.entries(D.pbqScales)){let raw=sc.items.reduce((sum,n)=>sum+Number(state.pbqAnswers[String(n)]??0),0); out[name]={raw,z:Math.round(((raw-sc.mean)/sc.sd)*100)/100, selected:(state.selectedScales||[]).includes(name)};} return out;}
function trendLine(current){return 'Trend comparison not available (prior session data is not retained for privacy)';}
function reportText(test=false){const pid=computePID(); const pbq=computePBQ(); const topDomains=Object.entries(pid.domains).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`- ${k}: ${v.toFixed(2)}`).join('\n'); const topFacets=Object.entries(pid.facets).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([k,v])=>`- ${k}: ${v.toFixed(2)}`).join('\n'); const topPBQ=Object.entries(pbq).sort((a,b)=>b[1].z-a[1].z).map(([k,v])=>`- ${k}: raw=${v.raw}, z=${v.z}${v.selected?' [targeted follow-up]':''}`).join('\n'); return `${test?'TEST EMAIL ONLY - ':''}Integrated Personality Assessment\nClinician: ${D.clinician}\nPatient: ${state.meta.name}\nDOB: ${state.meta.dob}\nPatient email: ${state.meta.email||'not provided'}\nCompleted: ${new Date().toLocaleString()}\n\nPID-5 highest domains:\n${topDomains}\n\nPID-5 highest facets:\n${topFacets}\n\nPBQ scales / belief scores:\n${topPBQ}\n\nAdaptive follow-up modules selected internally:\n${(state.selectedScales||[]).join(', ')}\n\nTrend comparison:\n${trendLine(pid)}\n\nOptional patient comments:\n${state.comments||'None'}\n\nNote: This screening/formulation tool is not diagnostic by itself and should be interpreted clinically.`;}
async function postToWeb3Forms(message, subject){const form=new FormData(); form.append('access_key', D.web3formsKey); form.append('subject', subject); form.append('from_name','Personality Assessment Form'); form.append('email', D.recipient); form.append('message', message); form.append('to', D.recipient); const res=await fetch('https://api.web3forms.com/submit',{method:'POST',body:form}); let json={}; try{json=await res.json();}catch(e){} if(!res.ok || json.success===false) throw new Error(json.message || ('Web3Forms error '+res.status)); return json;}
function setStatus(txt,ok=false){const el=$('#status'); if(!el) return; el.className='status '+(ok?'ok':'err'); el.textContent=txt;}
async function sendTestEmail(){try{setStatus('Sending test email...',true); await postToWeb3Forms('This is a test email from the integrated personality assessment form. If you received this, Web3Forms delivery is working.','TEST - Personality assessment form'); setStatus('Test email sent successfully. Please check contact@drshaikhdo.com including spam/promotions.',true);}catch(e){setStatus('Email test failed: '+e.message,false);}}
async function sendReport(){try{state.comments=$('#comments')?.value||state.comments; save(); setStatus('Sending your responses...',true); const msg=reportText(false); await postToWeb3Forms(msg,`Personality assessment completed - ${state.meta.name}`); sessionStorage.removeItem(STORE); state=defaultState(); state.page='done'; render();}catch(e){setStatus('Something went wrong: '+e.message+'\n\nYour answers have not been lost — please check your internet connection and try again.',false);}}
function render(){if(state.page==='pid') return pidPage(); if(state.page==='bridge') return bridge(); if(state.page==='pbq') return pbqPage(); if(state.page==='review') return review(); if(state.page==='done') return done(); return intro();}
window.addEventListener('error',e=>{console.error(e.error||e.message); const app=$('#app'); if(app && !app.innerHTML) app.innerHTML='<div class="wrap"><div class="card"><h2>Something went wrong</h2><p>The questionnaire couldn\'t load. Please refresh the page to try again. If the problem continues, let Dr. Shaikh\'s office know.</p></div></div>';});
render();
</script></body></html>
